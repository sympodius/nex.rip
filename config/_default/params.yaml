authors:
- name: John Urquhart Ferguson
  image: "images/Author - John Urquhart Ferguson.png"
  bio: "John was a collaborator before Nex had his brief stint with fame, helping with business aspects of the early *engeo* releases, giving advice on sound engineering and production, and building the first *engeo* website.\n\n

He's back now as the webmaster and editor for Nex.RIP, continuing to give advice on how to cheaply record music with computers at home. He'll be contributing articles here and there (mostly on the more technical topics)."
