- name: Nexami Engeo
  image: "images/Author - Nexami Engeo.png"
  bio: "Scottish singer/songwriter, best known from the band, *engeo*. After a couple of decades hiatus, he is back writing songs and spreading hope for a new generation.\n\n

Nex is still finding his way with modern recording techniques and DIY studios. However, whatever he discovers will be shared here so that all may benefit.\n\n

Despite reports to the contrary, Nex is very much alive."
