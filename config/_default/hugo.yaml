baseURL: https://www.nex.rip/
defaultContentLanguage: en
theme: cybercomic
enableEmoji: true
enableGitInfo: true

copyright: John Urquhart Ferguson. All Rights Reserved.

languages:
  en:
    direction: 'left-to-right'
    disabled: false
    label: 'English'
    locale: 'en-GB'
    title: 'Nex.RIP'
    weight: 0
    pagination:
      disableAliases: false
      pagerSize: 5
      path: page

markup:
  goldmark:
    renderer:
      unsafe: true
    parser:
      wrapStandAloneImageWithinParagraph: false
    renderHooks:
      image:
        useEmbedded: fallback
      link:
        useEmbedded: fallback

outputFormats:
  asc:
    baseName: asc
    mediaType: text/html
    path: ""
    permalinkable: true
    ugly: false

outputs:
  home:
    - html
    - rss
    - json
  section:
    - html
    - rss
  taxonomy:
    - html
  term:
    - html
    - rss
    - asc

imaging:
  exif:
    disableDate: false
    disableLatLong: false
    excludeFields: ""
    includeFields: ""
  bgColor: '#ffffff'
  hint: photo
  quality: 75
  resampleFilter: box

related:
  includeNewer: true
  indices:
  - applyFilter: false
    cardinalityThreshold: 0
    name: keywords
    pattern: ""
    toLower: false
    type: basic
    weight: 100
  - applyFilter: false
    cardinalityThreshold: 0
    name: date
    pattern: ""
    toLower: false
    type: basic
    weight: 10
  - applyFilter: false
    cardinalityThreshold: 0
    name: tags
    pattern: ""
    toLower: false
    type: basic
    weight: 80
  threshold: 80
  toLower: true
