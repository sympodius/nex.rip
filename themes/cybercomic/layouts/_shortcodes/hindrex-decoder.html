<form id="hindrexScoreToCode" onsubmit="convertHindrexScoreToCode(); return false;" style="margin-top: 1rem; margin-bottom: 1rem;">
  <label for="hindrexScoreIn">Hindrex Score:</label><br>
  <input id="hindrexScoreIn" placeholder="Hindrex score (eg, 3678)" class="inputbar" style="width: 20rem;">
  <button type="button" onclick="convertHindrexScoreToCode()" class="inputbutton" form="hindrexScoreToCode" style="width: 10rem;">Convert to code</button><br>
  <output name="hindrexCodeOut" for="hindrexScoreIn" id="hindrexCodeOut"></output>
</form>

<form id="hindrexCodeToScore" onsubmit="convertHindrexCodeToScore(); return false;" style="margin-top: 1rem; margin-bottom: 1.5rem;">
  <label for="hindrexCodeIn">Hindrex Code:</label><br>
  <input id="hindrexCodeIn" placeholder="Hindrex code (eg, FF-NN-RTR-LRC)" class="inputbar" style="width: 20rem;">
  <button type="button" onclick="convertHindrexCodeToScore()" class="inputbutton" form="hindrexCodeToScore" style="width: 10rem;">Convert to score</button><br>
  <output name="hindrexScoreOut" for="hindrexCodeIn" id="hindrexScoreOut"></output>
</form>

<script>
  const mapping = [
    [2048, "FOSS"],
    [1024, "ZI"],
    [512, "FP"],
    [256, "ZLS"],
    [128, "ZR"],
    [64, "FF"],
    [32, "A"],
    [16, "ZC"],
    [8, "NN"],
    [4, "RTR"],
    [2, "LRC"],
    [1, "LFC"],
  ];

  const codeToValue = Object.fromEntries(
    mapping.map(([value, code]) => [code, value])
  );

  function hindrexScoreToCode(score) {
    const parts = [];
    for (const [value, code] of mapping) {
      while (score >= value) {
        score -= value;
        parts.push(code);
      }
    }
    return parts.join("-");
  }

  const superseding = {
    FOSS: ["A"],
    FP:   ["ZLS", "ZR"],
    ZC:   ["LFC"],
  };

  function hindrexCodeToScore(code) {
    const parts = code.split("-").filter(Boolean);
    const present = new Set(parts);

    // Remove any code superseded by a higher-priority code that is also present
    const filtered = parts.filter(part => {
      for (const [dominant, dominated] of Object.entries(superseding)) {
        if (present.has(dominant) && dominated.includes(part)) {
          return false;
        }
      }
      return true;
    });

    return filtered.reduce((sum, part) => sum + (codeToValue[part] || 0), 0);
  }

  function findSupersedingConflicts(parts) {
    const present = new Set(parts);
    const conflicts = [];
    for (const [dominant, dominated] of Object.entries(superseding)) {
      if (present.has(dominant)) {
        for (const sub of dominated) {
          if (present.has(sub)) {
            conflicts.push({ dominant, sub });
          }
        }
      }
    }
    return conflicts;
  }

  function convertHindrexScoreToCode() {
    let result;
    let scoreIn = document.getElementById("hindrexScoreIn").value.trim().replace(/\*/g, "");
    let score = parseInt(scoreIn, 10);

    if (isNaN(score)) {
      result = "Input not valid";
    } else {
      const code = hindrexScoreToCode(score);
      const parts = code.split("-").filter(Boolean);
      const conflicts = findSupersedingConflicts(parts);

      let warning = "";
      if (conflicts.length > 0) {
        const messages = conflicts.map(c => c.dominant + " supersedes " + c.sub);
        const correctedParts = parts.filter(part => {
          for (const [dom, dominated] of Object.entries(superseding)) {
            if (parts.includes(dom) && dominated.includes(part)) return false;
          }
          return true;
        });
        const correctedScore = correctedParts.reduce((s, p) => s + codeToValue[p], 0);
        warning = "<br><span style='color:#f66;'>⚠ Score " + score + " is technically invalid: " +
                  messages.join(", ") + ". Corrected score: " + correctedScore + " (" +
                  correctedParts.join("-") + ").</span>";
      }

      result = "<em>Result:</em> <strong>" + code + "</strong>" + warning;
    }

    document.getElementById("hindrexCodeOut").innerHTML = result;
  }

  function convertHindrexCodeToScore() {
    let result;
    let codeIn = document.getElementById("hindrexCodeIn").value.trim().toUpperCase();

    const parts = codeIn.split("-").filter(Boolean);
    if (parts.length === 0) {
       result = "Input not valid";
    } else {
      const invalid = parts.filter((part) => !(part in codeToValue));
      if (invalid.length > 0) {
        result = "Input not valid";
      } else {
        result = "<em>Result:</em> <strong>" + hindrexCodeToScore(codeIn).toString() + "</strong>";
      }
    }

    document.getElementById("hindrexScoreOut").innerHTML = result;
  }
</script>{{- /* This comment removes trailing newlines. */ -}}
